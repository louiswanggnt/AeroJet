name: Validate PR

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  validate:
    name: Lint · Validate · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Upgrade npm (match local lockfile generator)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Validate promotions schedule
        run: npm run validate:promotions

      - name: Build active.json / archive.json
        run: npm run build:active

      - name: Lint
        run: npm run lint

      - name: Generate llms.txt
        run: npm run generate:llms

      - name: Build (dry-run, no deploy)
        env:
          NEXT_PUBLIC_SITE_URL: 'https://www.auvita.tw'
        run: npm run build

      - name: Check out/ generated
        run: |
          test -d out || (echo "::error::out/ not generated"; exit 1)
          echo "✅ Build OK — out/ size: $(du -sh out | cut -f1)"
