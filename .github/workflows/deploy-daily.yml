name: Deploy Daily (auto-rotate promotions)

on:
  schedule:
    # 每日台灣時間 00:05（UTC 16:05 前一日）
    # 5 分鐘 buffer 避免時區邊界誤差
    - cron: '5 16 * * *'
  workflow_dispatch:

concurrency:
  group: deploy-daily
  cancel-in-progress: false

jobs:
  rotate-and-deploy:
    name: Rotate active · Build · SFTP Upload
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate promotions schedule
        run: npm run validate:promotions

      - name: Build active.json / archive.json (rotate by today)
        run: npm run build:active

      - name: Check if active changed
        id: diff
        run: |
          if git diff --quiet data/promotions/active.json data/promotions/archive.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No rotation needed today"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "active/archive rotated — proceeding with rebuild & deploy"
          fi

      - name: Generate llms.txt
        if: steps.diff.outputs.changed == 'true'
        run: npm run generate:llms

      - name: Build Next.js
        if: steps.diff.outputs.changed == 'true'
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://www.auvita.tw' }}
        run: npm run build

      - name: Upload to auvita.tw via FTP
        if: steps.diff.outputs.changed == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT || 21 }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_REMOTE_PATH || '/' }}
          log-level: minimal
          sftp_only: true
          delete_remote_files: false

      - name: Commit rotated active/archive
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/promotions/active.json data/promotions/archive.json public/llms.txt
          if git diff --cached --quiet; then
            echo "Nothing to commit (race condition)"
          else
            git commit -m "chore(promotions): daily rotation $(date -u +%Y-%m-%d) [skip ci]"
            git push origin HEAD:main
          fi
